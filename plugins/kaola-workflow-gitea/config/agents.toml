[features]
multi_agent = true

[agents.code-explorer]
description = "Kaola-Workflow for Codex Phase 1 codebase researcher: maps affected files, patterns, tests, and config without editing."
config_file = "./agents/kaola-workflow/code-explorer.toml"
nickname_candidates = ["Explorer", "Mapper", "Scout"]

[agents.knowledge-lookup]
description = "Kaola-Workflow for Codex Phase 1 knowledge researcher: checks curated library/API docs (Context7) and, when runtime allows, the open web only when external behavior or expertise matters."
config_file = "./agents/kaola-workflow/knowledge-lookup.toml"
nickname_candidates = ["Docs", "Reference", "Lookup"]

[agents.planner]
description = "Kaola-Workflow for Codex Phase 2 strategist: compares grounded implementation approaches and scope tradeoffs."
config_file = "./agents/kaola-workflow/planner.toml"
nickname_candidates = ["Planner", "Strategist", "Options"]

[agents.code-architect]
description = "Kaola-Workflow for Codex Phase 3 architect: produces dependency-safe blueprints, write sets, task order, and validation commands."
config_file = "./agents/kaola-workflow/code-architect.toml"
nickname_candidates = ["Architect", "Blueprint", "Designer"]

[agents.tdd-guide]
description = "Kaola-Workflow for Codex Phase 4 executor: implements assigned tasks with RED -> GREEN -> REFACTOR evidence."
config_file = "./agents/kaola-workflow/tdd-guide.toml"
nickname_candidates = ["TDD", "Executor", "Builder"]

[agents.implementer]
description = "Kaola-Workflow for Codex adaptive implementer: implements work without test-first ceremony (refactors, scaffolding, config, UI, migrations), verified by change-type-appropriate checks."
config_file = "./agents/kaola-workflow/implementer.toml"
nickname_candidates = ["Implementer", "Builder", "Executor"]

[agents.build-error-resolver]
description = "Kaola-Workflow for Codex repair specialist: resolves build, type, lint, dependency, and tooling failures with scoped evidence."
config_file = "./agents/kaola-workflow/build-error-resolver.toml"
nickname_candidates = ["Resolver", "Repair", "Buildfix"]

[agents.code-reviewer]
description = "Kaola-Workflow for Codex Phase 5 reviewer: performs detached correctness, scope, maintainability, and test coverage review."
config_file = "./agents/kaola-workflow/code-reviewer.toml"
nickname_candidates = ["Reviewer", "Critic", "Inspector"]

[agents.security-reviewer]
description = "Kaola-Workflow for Codex conditional Phase 5 security reviewer: audits sensitive changes without editing files."
config_file = "./agents/kaola-workflow/security-reviewer.toml"
nickname_candidates = ["Security", "Audit", "Threat"]

[agents.doc-updater]
description = "Kaola-Workflow for Codex Finalization documentation specialist: updates docs only when behavior, setup, API, architecture, or workflow changed."
config_file = "./agents/kaola-workflow/doc-updater.toml"
nickname_candidates = ["Docs", "Docking", "Writer"]

[agents.adversarial-verifier]
description = "Kaola-Workflow for Codex adaptive-path falsifier: tries to disprove a recorded claim (refute-if-uncertain); read-only, never a gate."
config_file = "./agents/kaola-workflow/adversarial-verifier.toml"
nickname_candidates = ["Adversary", "Refuter", "Breaker"]

[agents.synthesizer]
description = "Kaola-Workflow for Codex adaptive write-convergence specialist: reconciles concurrent write legs by intent on a real merge conflict; reasoning-class, held to a non-lowerable reasoning-tier floor, never invoked for cleanly-disjoint legs."
config_file = "./agents/kaola-workflow/synthesizer.toml"
nickname_candidates = ["Synthesizer", "Merger", "Reconciler"]

[agents.contractor]
description = "Kaola-Workflow for Codex lean-orchestrator bookkeeper: mechanically runs scripts and transcribes evidence into durable state; never dispatches a role and never judges."
config_file = "./agents/kaola-workflow/contractor.toml"
nickname_candidates = ["Contractor", "Bookkeeper", "Scribe"]

[agents.workflow-planner]
description = "Kaola-Workflow for Codex adaptive front end: claims the project + worktree and authors the workflow-plan.md DAG; never freezes, judges, asks, or dispatches."
config_file = "./agents/kaola-workflow/workflow-planner.toml"
nickname_candidates = ["Workflow Planner", "DAG Author", "Front End"]

[agents.issue-scout]
description = "Kaola-Workflow for Codex bundle-lane backlog scout: read-only same-scope issue-set recommender; never claims, writes, or dispatches."
config_file = "./agents/kaola-workflow/issue-scout.toml"
nickname_candidates = ["Scout", "Backlog", "Triage"]

[agents.metric-optimizer]
description = "Kaola-Workflow for Codex adaptive metric-ratchet specialist: proposes, applies, regression-gates, and measures a metric (median-of-K) each iteration, accepting or rejecting against the running baseline until a stop condition fires."
config_file = "./agents/kaola-workflow/metric-optimizer.toml"
nickname_candidates = ["Optimizer", "Ratchet", "Tuner"]
